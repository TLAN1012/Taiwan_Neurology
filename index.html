/* ── 常數 ── */
const monthNames = { 4: "四月", 5: "五月", 6: "六月", 9: "九月" };
const regionNames = { north: "北區", central: "中區", south: "南區", east: "東區", online: "線上" };
const regionBadgeClass = { north: "badge-north", central: "badge-central", south: "badge-south", east: "badge-east", online: "badge-online" };
const baseUrl = "https://www.neuro.org.tw/active/other_toApply_OK.asp?SID=";
let selectedRegion = "";

/* ── 初始化 ── */
document.getElementById("totalCount").textContent = events.length;
// 顯示各區域數量
document.querySelectorAll(".region-btn").forEach(btn => {
  const r = btn.dataset.region;
  const c = r ? events.filter(e => e.region === r).length : events.length;
  btn.innerHTML = `${btn.textContent}<span class="region-count">(${c})</span>`;
});

/* ── 工具函數 ── */
function formatDate(d) {
  const [y, m, day] = d.split("-");
  return `${parseInt(m)}/${parseInt(day)}（${"日一二三四五六"[new Date(d).getDay()]}）`;
}

function parseTimeRange(dateStr, timeStr) {
  // 解析起始時間
  const simpleMatch = timeStr.match(/^(\d{1,2}):(\d{2})\s*[–\-~～]\s*(\d{1,2}):(\d{2})/);
  if (simpleMatch) {
    const [, sh, sm, eh, em] = simpleMatch;
    return {
      start: dateStr.replace(/-/g, "") + "T" + sh.padStart(2,"0") + sm + "00",
      end:   dateStr.replace(/-/g, "") + "T" + eh.padStart(2,"0") + em + "00"
    };
  }
  // 跨日格式: "4/18 09:00 – 4/19 16:45（兩日）" 或 "5/2 10:00 – 5/3 16:40（兩日）"
  const multiMatch = timeStr.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})\s*[–\-~～]\s*(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (multiMatch) {
    const [, sm, sd, sh, smin, em, ed, eh, emin] = multiMatch;
    const year = dateStr.slice(0, 4);
    return {
      start: year + sm.padStart(2,"0") + sd.padStart(2,"0") + "T" + sh.padStart(2,"0") + smin + "00",
      end:   year + em.padStart(2,"0") + ed.padStart(2,"0") + "T" + eh.padStart(2,"0") + emin + "00"
    };
  }
  // 無法解析 → 全天事件
  const d = dateStr.replace(/-/g, "");
  return { start: d, end: d };
}

function buildGCalUrl(ev) {
  const t = parseTimeRange(ev.date, ev.time);
  const params = new URLSearchParams({
    action: "TEMPLATE",
    text: ev.title,
    dates: t.start + "/" + t.end,
    location: ev.location,
    details: "主辦：" + ev.organizer + "\n詳情：" + baseUrl + ev.sid
  });
  return "https://calendar.google.com/calendar/render?" + params.toString();
}

const calendarSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

/* ── 區域按鈕 ── */
function setRegion(btn) {
  document.querySelectorAll(".region-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedRegion = btn.dataset.region;
  filterEvents();
}

/* ── 渲染 ── */
function renderEvents(list) {
  const container = document.getElementById("eventList");
  container.innerHTML = "";
  document.getElementById("filterCount").textContent = `顯示 ${list.length} / ${events.length} 場`;

  if (list.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-light);">沒有符合條件的課程</div>';
    return;
  }

  let currentMonth = null;
  list.forEach(ev => {
    if (ev.month !== currentMonth) {
      currentMonth = ev.month;
      const h = document.createElement("div");
      h.className = "month-header";
      h.textContent = `${ev.date.slice(0,4)} 年 ${monthNames[currentMonth] || currentMonth + "月"}`;
      container.appendChild(h);
    }

    const card = document.createElement("div");
    let cardClass = "event-card";
    if (ev.online) cardClass += " online";
    else cardClass += " region-" + ev.region;
    card.className = cardClass;

    let badges = "";
    if (ev.region && regionNames[ev.region]) {
      badges += `<span class="badge ${regionBadgeClass[ev.region]}">${regionNames[ev.region]}</span>`;
    }
    if (ev.closed) badges += '<span class="badge badge-closed">閉門</span>';

    const gcalUrl = buildGCalUrl(ev);

    card.innerHTML = `
      <div class="event-header">
        <div class="event-title">
          <a href="${baseUrl}${ev.sid}" target="_blank">${ev.title}</a>${badges}
        </div>
        <a class="gcal-btn" href="${gcalUrl}" target="_blank" title="加入 Google 行事曆">
          ${calendarSvg}加入行事曆
        </a>
      </div>
      <div class="event-meta">
        <span class="label">日期</span><span>${formatDate(ev.date)}</span>
        <span class="label">時間</span><span>${ev.time}</span>
        <span class="label">地點</span><span>${ev.location}</span>
        <span class="label">主辦</span><span>${ev.organizer}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function filterEvents() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  const m = document.getElementById("monthFilter").value;
  const filtered = events.filter(ev => {
    if (m && ev.month !== parseInt(m)) return false;
    if (selectedRegion && ev.region !== selectedRegion) return false;
    if (q && !(ev.title.toLowerCase().includes(q) || ev.location.toLowerCase().includes(q) || ev.organizer.toLowerCase().includes(q))) return false;
    return true;
  });
  renderEvents(filtered);
}

renderEvents(events);
</script>
