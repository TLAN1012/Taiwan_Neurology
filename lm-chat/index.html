<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#242424">
<title>LM Studio Chat</title>
<style>
  :root {
    --bg: #1a1a1a; --panel: #242424; --border: #3a3a3a;
    --text: #e8e8e8; --muted: #999; --accent: #4a9eff;
    --user: #2d4a6e; --assistant: #2a2a2a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  header {
    padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .header-row { display: flex; gap: 6px; align-items: center; }
  .header-row > input, .header-row > select { flex: 1; min-width: 0; }
  header input, header select, header button {
    background: #1a1a1a; color: var(--text); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 6px; font-size: 14px; min-height: 36px;
  }
  header button { cursor: pointer; white-space: nowrap; min-width: 40px; }
  header button:hover { background: #333; }
  .status { font-size: 12px; color: var(--muted); text-align: right; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }

  .settings {
    padding: 8px 12px; background: #1f1f1f; border-bottom: 1px solid var(--border);
    display: none; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .settings.open { display: flex; }
  .settings label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .settings input[type="number"] {
    width: 80px; background: #1a1a1a; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 6px; font-size: 14px;
  }
  .settings .sys-wrap { flex: 1 1 100%; display: flex; flex-direction: column; gap: 4px; }
  .settings textarea {
    background: #1a1a1a; color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px; font-size: 14px; font-family: inherit;
    width: 100%; height: 60px; resize: vertical;
  }

  #chat {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 88%; padding: 9px 12px; border-radius: 12px; white-space: pre-wrap;
    word-wrap: break-word; overflow-wrap: anywhere; line-height: 1.5; font-size: 15px;
  }
  .msg.user { background: var(--user); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: var(--assistant); align-self: flex-start;
    border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.system { background: transparent; color: var(--muted); align-self: center;
    font-size: 12px; font-style: italic; border: 1px dashed var(--border); max-width: 94%; }
  .msg .role { font-size: 10px; color: var(--muted); margin-bottom: 3px;
    text-transform: uppercase; letter-spacing: 0.5px; }
  .msg .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

  footer {
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
    background: var(--panel); border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end;
  }
  #input {
    background: #1a1a1a; color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; font-size: 16px;
    font-family: inherit; resize: none; min-height: 44px; max-height: 40vh;
    width: 100%;
  }
  .btn-col { display: flex; flex-direction: column; gap: 6px; }
  .btn-col button {
    padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 14px; min-height: 44px; min-width: 64px;
  }
  #send { background: var(--accent); color: #fff; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #stop { background: #dc2626; color: #fff; display: none; }
  #clear { background: #444; color: var(--text); }

  @media (max-width: 640px) {
    header { grid-template-columns: 1fr auto; }
    header label { display: none; }
    .msg { font-size: 14px; max-width: 92%; }
    .status { font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <input id="endpoint" value="http://100.121.34.14:1234/v1" placeholder="Endpoint URL">
    <button id="reload" title="重新載入模型">↻</button>
    <button id="toggleSettings" title="設定">⚙</button>
  </div>
  <div class="header-row">
    <select id="model"><option value="">(尚未載入)</option></select>
    <button id="clear" title="清空對話">🗑</button>
  </div>
  <span id="status" class="status">未連線</span>
</header>

<div class="settings" id="settings">
  <label>Temperature: <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1"></label>
  <label>Max tokens: <input type="number" id="maxTokens" value="-1" min="-1" step="1"></label>
  <label>System prompt:
    <textarea id="sysPrompt" placeholder="（留空表示不使用 system prompt）"></textarea>
  </label>
</div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="輸入訊息… (Enter 送出 / Shift+Enter 換行)"></textarea>
  <div class="btn-col">
    <button id="send">送出</button>
    <button id="stop">停止</button>
  </div>
</footer>

<script>
const $ = id => document.getElementById(id);
const endpointEl = $('endpoint');
const modelEl = $('model');
const statusEl = $('status');
const chatEl = $('chat');
const inputEl = $('input');
const sendBtn = $('send');
const stopBtn = $('stop');

let history = [];     // {role, content}
let controller = null;

function setStatus(text, cls='') {
  statusEl.textContent = text;
  statusEl.className = 'status ' + cls;
}

function addMsg(role, content, meta='') {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const roleLabel = document.createElement('div');
  roleLabel.className = 'role';
  roleLabel.textContent = role;
  const body = document.createElement('div');
  body.className = 'body';
  body.textContent = content;
  div.appendChild(roleLabel);
  div.appendChild(body);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return body;
}

async function loadModels() {
  const url = endpointEl.value.replace(/\/+$/, '') + '/models';
  setStatus('載入模型中…');
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const models = (data.data || []).map(m => m.id);
    modelEl.innerHTML = '';
    if (models.length === 0) {
      modelEl.innerHTML = '<option value="">(無模型)</option>';
      setStatus('已連線，但沒有可用模型', 'err');
      return;
    }
    for (const id of models) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = id;
      modelEl.appendChild(opt);
    }
    // 還原上次選擇
    const last = localStorage.getItem('lm-model');
    if (last && models.includes(last)) modelEl.value = last;
    setStatus(`已連線 · ${models.length} 個模型`, 'ok');
  } catch (e) {
    setStatus('連線失敗: ' + e.message, 'err');
  }
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  const model = modelEl.value;
  if (!model) { alert('請先選擇模型'); return; }

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  // 組 messages
  const sys = $('sysPrompt').value.trim();
  const messages = [];
  if (sys) messages.push({ role: 'system', content: sys });
  messages.push(...history);

  const body = {
    model,
    messages,
    temperature: parseFloat($('temperature').value),
    max_tokens: parseInt($('maxTokens').value),
    stream: true
  };

  const url = endpointEl.value.replace(/\/+$/, '') + '/chat/completions';
  const assistantBody = addMsg('assistant', '');
  const metaEl = document.createElement('div');
  metaEl.className = 'meta';
  assistantBody.parentElement.appendChild(metaEl);

  sendBtn.disabled = true;
  stopBtn.style.display = 'inline-block';
  controller = new AbortController();

  const t0 = performance.now();
  let firstTokenAt = null;
  let tokenCount = 0;
  let acc = '';

  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    if (!r.ok) {
      const errText = await r.text();
      throw new Error('HTTP ' + r.status + ': ' + errText);
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const s = line.trim();
        if (!s.startsWith('data:')) continue;
        const payload = s.slice(5).trim();
        if (payload === '[DONE]') continue;
        try {
          const obj = JSON.parse(payload);
          const delta = obj.choices?.[0]?.delta?.content || '';
          if (delta) {
            if (!firstTokenAt) firstTokenAt = performance.now();
            tokenCount++;
            acc += delta;
            assistantBody.textContent = acc;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch(e) {}
      }
    }
    const t1 = performance.now();
    const ttft = firstTokenAt ? ((firstTokenAt - t0) / 1000).toFixed(2) : '-';
    const elapsed = ((t1 - (firstTokenAt || t0)) / 1000);
    const tps = tokenCount && elapsed > 0 ? (tokenCount / elapsed).toFixed(1) : '-';
    metaEl.textContent = `TTFT ${ttft}s · ${tokenCount} chunks · ${tps} chunk/s`;
    history.push({ role: 'assistant', content: acc });
  } catch (e) {
    if (e.name === 'AbortError') {
      metaEl.textContent = '（已中止）';
      if (acc) history.push({ role: 'assistant', content: acc });
    } else {
      assistantBody.textContent = '[錯誤] ' + e.message;
      assistantBody.parentElement.classList.add('system');
    }
  } finally {
    sendBtn.disabled = false;
    stopBtn.style.display = 'none';
    controller = null;
    localStorage.setItem('lm-model', modelEl.value);
    localStorage.setItem('lm-endpoint', endpointEl.value);
    localStorage.setItem('lm-sys', $('sysPrompt').value);
  }
}

// 事件
$('reload').onclick = loadModels;
sendBtn.onclick = send;
stopBtn.onclick = () => controller && controller.abort();
$('clear').onclick = () => {
  history = [];
  chatEl.innerHTML = '';
  addMsg('system', '對話已清空');
};
$('toggleSettings').onclick = () => $('settings').classList.toggle('open');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// 還原設定
const savedEp = localStorage.getItem('lm-endpoint');
if (savedEp) endpointEl.value = savedEp;
const savedSys = localStorage.getItem('lm-sys');
if (savedSys) $('sysPrompt').value = savedSys;

// 啟動時自動載入
loadModels();
</script>
</body>
</html>
